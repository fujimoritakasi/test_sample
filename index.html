<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF表示サイト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>PDF表示サイト</h1>
            <p>以下のリンクをクリック・タップしてPDFファイルを開いてください</p>
        </header>

        <main>
            <div class="pdf-links">
                <div class="pdf-item">
                    <h3>PDFドキュメント</h3>
                    <p>PDFファイルを表示します</p>
                    <a href="pdf_test.pdf" target="_blank" class="pdf-link">
                        📄 PDFを開く
                    </a>
                </div>
            </div>

            <div class="app-redirect">
                <h2>アプリを開く</h2>
                <p>URLパラメータの <code>redirectUrl</code> に指定されたアプリへ遷移します。</p>
                <button type="button" class="app-link-button" id="appLinkButton" disabled>
                    アプリを開く
                </button>
                <p class="app-link-status" id="appLinkStatus">redirectUrl パラメータを確認しています。</p>
            </div>

            <!-- インラインでPDFを表示するオプション -->
            <div class="inline-pdf">
                <h2>インライン表示</h2>
                <p>ブラウザ内でPDFを直接表示</p>
                <iframe src="pdf_test.pdf" width="100%" height="600px" class="pdf-iframe">
                    お使いのブラウザはPDFの表示をサポートしていません。
                    <a href="pdf_test.pdf">こちらからPDFをダウンロードしてください</a>
                </iframe>
            </div>
        </main>

        <footer>
            <p>&copy; 2025 PDF表示サイト</p>
        </footer>
    </div>

    <script>
        const appLinkButton = document.getElementById('appLinkButton');
        const appLinkStatus = document.getElementById('appLinkStatus');
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirectUrl');

        if (redirectUrl) {
            appLinkButton.disabled = false;
            appLinkStatus.textContent = 'ボタンをタップすると指定アプリへ遷移します。';

            appLinkButton.addEventListener('click', () => {
                window.location.href = redirectUrl;
            });
        } else {
            appLinkStatus.textContent = 'redirectUrl パラメータがないため、ボタンは無効です。';
        }

        // PDFリンクがクリックされた時の処理
        document.querySelectorAll('.pdf-link').forEach(link => {
            link.addEventListener('click', function(e) {
                console.log('PDFリンクがクリックされました:', this.href);
            });
        });

        // モバイルデバイスでの最適化
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            // モバイルデバイスの場合、iframeを非表示にする
            const iframe = document.querySelector('.pdf-iframe');
            if (iframe) {
                iframe.style.display = 'none';
                const message = document.createElement('p');
                message.textContent = 'モバイルデバイスではリンクをタップしてPDFを開いてください。';
                message.style.textAlign = 'center';
                message.style.padding = '20px';
                message.style.backgroundColor = '#f0f0f0';
                iframe.parentNode.insertBefore(message, iframe);
            }
        }
    </script>
</body>
</html>
